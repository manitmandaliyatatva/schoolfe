<div class="change-password-container">
    <form [formGroup]="changePasswordForm" (ngSubmit)="submit()">
        <common-dynamic-form [formControls]="dynamicForm" [showCard]="false"></common-dynamic-form>
        
        <div class="form-actions">
            <common-button [config]="cancelBtn"></common-button>
            <common-button [config]="saveBtn"></common-button>
        </div>
    </form>
</div>
