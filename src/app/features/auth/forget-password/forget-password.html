<form class="auth-form" [formGroup]="resetPasswordForm" (ngSubmit)="submit()">
  <div class="auth-copy">
    <p>{{Login_Const.FORGET_PASSWORD_INSTRUCTION}}</p>
  </div>
  <common-dynamic-form [formControls]="dynamicForm"></common-dynamic-form>
  <a class="forgot-link" routerLink="/login">{{Login_Const.BACK_TO_LOGIN}}</a>
  <common-button [config]="sendResetLinkButtonConfig()"></common-button>
</form>
