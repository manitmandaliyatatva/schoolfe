<div class="page-header">
  <div class="container text-center animate-fade-in-up">
    <h1>Our Facilities & Offerings</h1>
    <p>We provide a nurturing environment equipped with modern amenities to foster all-round development.</p>
  </div>
</div>

<section class="section features-detail">
  <div class="container">
    <div class="erp-grid">

      @for (item of featureStore.list(); track $index) {
      <div class="feature-module premium-card animate-fade-in-up" [style.animation-delay]="($index * 0.1) + 's'" style="opacity: 0; animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;">
        <div class="module-icon"><img [src]="getSafeImageSrc(item.icon ?? '')" [alt]="item.title ?? ''" height="25px" width="25px"></div>
        <div class="module-content">
          <h3>{{item.title}}</h3>
          <p>{{item.description}}</p>
        </div>
      </div>
      } @empty {
      <div class="empty-state text-center" style="padding: 4rem 2rem; background: rgba(var(--surface-color-rgb), 0.5); border-radius: 12px; grid-column: 1 / -1; width: 100%;">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem; opacity: 0.5;">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="9" y1="3" x2="9" y2="21"></line>
        </svg>
        <h3 style="color: var(--text-secondary); margin-bottom: 0;">No facilities available at the moment.</h3>
      </div>
      }
    </div>

    <!-- <div class="features-cta text-center animate-fade-in-up" style="animation-delay: 0.9s; margin-top: 4rem;">
      <h3 style="margin-bottom: 1.5rem; color: var(--primary-dark);">Experience our campus firsthand</h3>
      <button class="btn btn-primary btn-lg">Schedule a Campus Tour</button>
    </div> -->
  </div>
</section>
